services:
  meo2cpa:
    image: ${MEO2CPA_IMAGE:-eceasy/meo2cpa:latest}
    pull_policy: always
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${VERSION:-dev}
        COMMIT: ${COMMIT:-none}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    container_name: meo2cpa
    # env_file:
    #   - .env
    environment:
      DEPLOY: ${DEPLOY:-}
    ports:
      - "8317:8317"
      - "8085:8085"
      - "1455:1455"
      - "54545:54545"
      - "51121:51121"
      - "11451:11451"
    volumes:
      - ${MEO2CPA_CONFIG_PATH:-./config.yaml}:/Meo2cpa/config.yaml
      - ${MEO2CPA_AUTH_PATH:-./auths}:/root/.meo2cpa
      - ${MEO2CPA_LOG_PATH:-./logs}:/Meo2cpa/logs
    restart: unless-stopped
