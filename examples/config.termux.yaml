# Termux-oriented example configuration for Meo2cpa
host: "127.0.0.1"
port: 8317

tls:
  enable: false
  cert: ""
  key: ""

remote-management:
  allow-remote: false
  secret-key: "change-this-management-key"
  disable-control-panel: false
  panel-github-repository: "https://github.com/router-for-me/Cli-Proxy-API-Management-Center"
  panel-path: "./panel"

auth-dir: "./auths"

api-keys:
  - "change-this-api-key"

debug: false
logging-to-file: true
logs-max-total-size-mb: 256
error-logs-max-files: 20
usage-statistics-enabled: true
proxy-url: ""
force-model-prefix: false
passthrough-headers: false
request-retry: 3
max-retry-credentials: 0
max-retry-interval: 30
disable-cooling: false
ws-auth: false
enable-gemini-cli-endpoint: false
nonstream-keepalive-interval: 0

pprof:
  enable: false
  addr: "127.0.0.1:8316"

routing:
  strategy: "round-robin"
  session-affinity: false
  session-affinity-ttl: "1h"

quota-exceeded:
  switch-project: true
  switch-preview-model: true
  antigravity-credits: true

# Fill in provider credentials below as needed.
# Keep auth-dir under the project directory when running in Termux to simplify backup and migration.
# Keep panel-path under the project directory so the management UI survives package/runtime upgrades.
